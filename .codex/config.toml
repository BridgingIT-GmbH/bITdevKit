# Repository-scoped Codex configuration.
# Codex loads this file only for trusted checkouts of this repository.

[mcp_servers.bdk]
command = "dotnet"
args = [
  "run",
  "--project",
  "src/Presentation.Cli/Presentation.Cli.csproj",
  "--",
  "mcp",
  "--toolset",
  "diagnostics,operations,admin",
]
cwd = ".."
startup_timeout_sec = 60
tool_timeout_sec = 120
enabled = false
