name: CI

on: [ push ]

permissions: # needed for test reporter
  pull-requests: write
  contents: write
  statuses: write
  checks: write
  actions: write


env: # https://docs.github.com/en/actions/learn-github-actions/variables
  # Solution_Name: '**/*.sln'
  Build_Configuration: Debug # cannot use Release due to assembly signing with missing .snk
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  MinVerDefaultPreReleaseIdentifiers: preview.0
  NUGET_PUSH: ${{ vars.NUGET_PUSH || 'false' }}
  NUGET_SOURCE: https://api.nuget.org/v3/index.json
  NUGET_DIRECTORY: ${{ github.workspace }}/artifacts/packages
  PUBLISHABLE_BRANCHES: main,releases/dotnet9

defaults:
  run:
    shell: bash

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calculate_version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.0.0
        with:
          global-json-file: global.json

      - run: dotnet --info

      - name: Install minver tool
        run: dotnet tool install --global minver-cli --version 4.3.0

      - name: Calculate version
        id: calculate_version
        run: |
          VERSION=$(minver -v d)
          echo "Calculated version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "BUILD_VERSION=$VERSION" >> "$GITHUB_ENV"

          echo "## Version" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`$VERSION\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Show version
        run: |
          echo "Build version: ${{ steps.calculate_version.outputs.version }}"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.0.0
        with:
          global-json-file: global.json

      - run: dotnet --info

      - name: Cache nuget packages
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore nuget packages
        run: dotnet restore --verbosity Normal

      - name: Build solution
        run: dotnet build --configuration ${{ env.Build_Configuration }} --no-restore --nologo

      # - name: Vulnerability scan (nuget)
      #   run: |
      #     dotnet list package --vulnerable --include-transitive 2>&1 | tee build.log
      #     echo "Analyze dotnet list package command log output..."
      #     grep -q -i "critical\|high\|moderate\|low" build.log; [ $? -eq 0 ] && echo "Security Vulnerabilities found on the log output" && exit 1

      - name: Publish build artifacts
        uses: actions/upload-artifact@v4.3.3
        with:
          name: BuildOutput
          if-no-files-found: error
          retention-days: 1
          path: |
            src/**/bin/${{ env.Build_Configuration }}/**
            src/**/obj/**
            tests/**/bin/${{ env.Build_Configuration }}/**
            tests/**/obj/**

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: [ version, build ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.1

      - name: Download build artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          name: BuildOutput
          path: .

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.0.0
        with:
          global-json-file: global.json

      - run: dotnet --info

      - name: Cache nuget packages
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Run unit tests
        run: |
          shopt -s globstar nullglob
          test_projects=(tests/**/*UnitTests.csproj)

          echo "## Unit Tests" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Projects discovered: ${#test_projects[@]}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Project | Result | Attempts |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- | ---: |" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${#test_projects[@]}" -eq 0 ]]; then
            echo "| _none_ | Failed | 0 |" >> "$GITHUB_STEP_SUMMARY"
            echo "::error::No unit test projects found."
            exit 1
          fi

          for test_project in "${test_projects[@]}"; do
            max_attempts=4
            project_name=$(basename "$test_project")
            test_succeeded=false

            for ((attempt = 1; attempt <= max_attempts; attempt++)); do
              echo "Running $test_project (attempt $attempt of $max_attempts)"

              if dotnet test "$test_project" --configuration ${{ env.Build_Configuration }} --no-restore --no-build --nologo --logger "trx;LogFileName=test-results.trx"; then
                test_succeeded=true
                break
              fi

              if [[ "$attempt" -lt "$max_attempts" ]]; then
                retry=$((attempt))
                echo "::warning::Test run failed for $test_project. Retrying ($retry of 3)."
              fi
            done

            if [[ "${test_succeeded}" != "true" ]]; then
              echo "| \`$project_name\` | Failed | $max_attempts |" >> "$GITHUB_STEP_SUMMARY"
              echo "::error::Test project failed after 3 retries: $test_project"
              exit 1
            fi

            echo "| \`$project_name\` | Passed | $attempt |" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Report unit test results # https://octopus.com/blog/githubactions-running-unit-tests
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Tests
          path: "**/test-results.trx"
          reporter: dotnet-trx
          fail-on-error: true

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [ version, tests ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.1

      - name: Download build artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          name: BuildOutput
          path: .

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.0.0
        with:
          global-json-file: global.json

      - run: dotnet --info

      - name: Cache nuget packages
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Package evaluation (nuget)
        id: publishing
        run: |
          is_publishable=false
          should_push=false

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            is_publishable=true
          else
            IFS=',' read -ra publishable_branches <<< "${PUBLISHABLE_BRANCHES}"

            for branch in "${publishable_branches[@]}"; do
              if [[ "${GITHUB_REF_NAME}" == "${branch}" ]]; then
                is_publishable=true
                break
              fi
            done
          fi

          if [[ "${NUGET_PUSH,,}" == "true" ]]; then
            should_push=true
          fi

          echo "is_publishable=${is_publishable}" >> "$GITHUB_OUTPUT"
          echo "should_push=${should_push}" >> "$GITHUB_OUTPUT"
          echo "Publishable branch: ${is_publishable}"
          echo "NuGet push enabled: ${should_push}"

          echo "## Package Publishing" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Ref | \`${GITHUB_REF_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Ref type | \`${GITHUB_REF_TYPE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Publishable ref | \`${is_publishable}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| NuGet push enabled | \`${should_push}\` |" >> "$GITHUB_STEP_SUMMARY"

      - name: Package pack (nuget)
        if: ${{ success() && steps.publishing.outputs.is_publishable == 'true' }}
        run: |
          mkdir -p "${NUGET_DIRECTORY}"
          mapfile -t package_projects < <(find . -name '*.csproj' -type f \
            ! -path './examples/*' \
            ! -name '*Tests.csproj' \
            | sort)

          if [[ "${#package_projects[@]}" -eq 0 ]]; then
            echo "::error::No package projects found."
            exit 1
          fi

          for package_project in "${package_projects[@]}"; do
            dotnet pack "$package_project" --configuration ${{ env.Build_Configuration }} --no-restore --no-build --nologo --output "${NUGET_DIRECTORY}" --verbosity normal
          done

          mapfile -t packages < <(find "${NUGET_DIRECTORY}" -maxdepth 1 -name '*.nupkg' -type f | sort)

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Packages Created" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Packages created: ${#packages[@]}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- |" >> "$GITHUB_STEP_SUMMARY"

          for package in "${packages[@]}"; do
            echo "| \`$(basename "$package")\` |" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Package push (nuget)
        if: ${{ success() && steps.publishing.outputs.is_publishable == 'true' && steps.publishing.outputs.should_push == 'true' }}
        env:
          API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [[ -z "${API_KEY}" ]]; then
            echo "::error::NUGET_API_KEY secret is not set."
            exit 1
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Packages Pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"

          for package in "${NUGET_DIRECTORY}"/*.nupkg; do
            echo "Publishing package: $package"
            if dotnet nuget push "$package" --source "${NUGET_SOURCE}" --api-key "${API_KEY}" --skip-duplicate; then
              echo "| \`$(basename "$package")\` | Pushed |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| \`$(basename "$package")\` | Failed |" >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi
          done

      - name: Publish package artifacts
        if: ${{ success() && steps.publishing.outputs.is_publishable == 'true' }}
        uses: actions/upload-artifact@v4.3.3
        with:
          name: NuGet packages
          if-no-files-found: error
          retention-days: 7
          path: ${{ env.NUGET_DIRECTORY }}/*.nupkg