services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: bdk_mssql
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Abcd1234!
      - MSSQL_PID=Developer
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S mssql -U sa -P 'Abcd1234!' -Q 'select 1'
    ports:
      - 14333:1433
    volumes:
      - mssql:/var/opt/mssql
    networks:
      - bdk

  mssqlscripts:
    image: mcr.microsoft.com/mssql-tools:latest
    container_name: bdk_mssqlscripts
    depends_on:
      - mssql
    command: /bin/bash -c 'until /opt/mssql-tools/bin/sqlcmd -S mssql -U sa -P "Abcd1234!" -Q "SELECT @@VERSION"; do sleep 5; done'
    networks:
      - bdk

  seq:
    image: datalust/seq:preview
    container_name: bdk_seq
    restart: unless-stopped
    ports:
      - 15347:80 # http://localhost:15347 azure:https://ml-software.ch/posts/running-seq-on-azure
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINUSERNAME=admin
      # https://blog.datalust.co/setting-an-initial-password-when-deploying-seq-to-docker/
      - SEQ_FIRSTRUN_ADMINPASSWORDHASH=FIQIay86/lqTJOWoq8jeh1KUr3wSfubJJ+/mB+fluLSK+ZhBQQ== # admin
    volumes:
      - seq:/data
    networks:
      - bdk

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: bdk_jaeger
    restart: unless-stopped
    ports:
      - 5775:5775/udp
      - 5778:5778
      - 6831:6831/udp
      - 6832:6832/udp # AgentPort
      - 9411:9411
      - 14268:14268
      - 4319:4317
      - 4320:4318
      - 16688:16686 # http://localhost:16688
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=memory
    networks:
      - bdk

  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: bdk_otel_collector
    restart: unless-stopped
    command:
      - "--config=/etc/otelcol/config.yaml"
    ports:
      - 4317:4317
      - 4318:4318
    volumes:
      - ./tools/docker/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    networks:
      - bdk

  llm:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: bdk_llm
    restart: unless-stopped
    ports:
      - "8080:8080" # http://localhost:8080

    environment:
      # llama.cpp uses this cache when downloading models via -hf
      LLAMA_CACHE: /cache

    volumes:
      # GGUF download/cache is kept outside the container image
      - ./tools/llama/cache:/cache

    command:
      - -hf
      - bartowski/Llama-3.2-1B-Instruct-GGUF:Q4_K_M
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --ctx-size
      - "2048"
      - --temp
      - "0.2"
      - -n
      - "160"

volumes:
  mssql:
    name: bdk_mssql
    driver: local
  seq:
    name: bdk_seq
    driver: local
networks:
  bdk:
    name: bdk
    driver: bridge
