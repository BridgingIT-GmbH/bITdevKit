      - Testing and Test Utilities:
          - Fake Authentication for Integration Tests: reference/testing-fake-authentication.md
          - Testing Common XUnit: reference/testing-common-xunit.md

theme:
  name: material
  logo: assets/images/bITDevKit_Icon.svg
  favicon: assets/images/bITDevKit_Icon.svg
  font: false
  features:
    - navigation.instant
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bridgingIT/bITdevKit
      name: GitHub
    - icon: fontawesome/solid/cube
      link: https://www.nuget.org/packages?q=bitdevkit
      name: NuGet
